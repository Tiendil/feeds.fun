version = 1

#############################
# Relation: tested_by / tests
#############################

[[relations]]
id = "tested_by"
description = "Tests that verify the artifact."

[[relations]]
id = "tests"
description = "Artifacts verified by the test."

# Backend package initializers are verified by matching tests/test_init.py files.
[[rules]]
relation = "tested_by"
input = { type = "all", items = [
  { type = "glob", pattern = "@/ffun/ffun/{**package_path}/__init__.py" },
  { type = "not", item = { type = "glob", pattern = "@/ffun/ffun/**/tests/**/*.py" } },
] }
output = { type = "files", pattern = "@/ffun/ffun/{package_path}/tests/test_init.py" }

# Regular backend modules are verified by sibling tests/test_<module>.py files.
[[rules]]
relation = "tested_by"
input = { type = "all", items = [
  { type = "glob", pattern = "@/ffun/ffun/{**package_path}/{*module}.py" },
  { type = "not", item = { type = "glob", pattern = "@/ffun/ffun/**/__init__.py" } },
  { type = "not", item = { type = "glob", pattern = "@/ffun/ffun/**/tests/**/*.py" } },
  { type = "not", item = { type = "glob", pattern = "@/ffun/ffun/**/migrations/*.py" } },
] }
output = { type = "files", pattern = "@/ffun/ffun/{package_path}/tests/test_{module}.py" }

# Backend tests/test_init.py maps back to the package initializer it verifies.
[[rules]]
relation = "tests"
input = { type = "glob", pattern = "@/ffun/ffun/{**package_path}/tests/test_init.py" }
output = { type = "list", artifacts = ["@/ffun/ffun/{package_path}/__init__.py"] }

# Backend tests/test_<module>.py maps back to the module it verifies.
[[rules]]
relation = "tests"
input = { type = "glob", pattern = "@/ffun/ffun/{**package_path}/tests/test_{*module}.py" }
output = { type = "list", artifacts = ["@/ffun/ffun/{package_path}/{module}.py"] }

# Frontend shared logic modules are verified by matching logic/tests/*.test.ts files.
[[rules]]
relation = "tested_by"
input = { type = "glob", pattern = "@/site/src/logic/{*module}.ts" }
output = { type = "files", pattern = "@/site/src/logic/tests/{module}.test.ts" }

# Frontend shared logic tests map back to the module they verify.
[[rules]]
relation = "tests"
input = { type = "glob", pattern = "@/site/src/logic/tests/{*module}.test.ts" }
output = { type = "list", artifacts = ["@/site/src/logic/{module}.ts"] }

#################################
# Relation: imports / imported_by
#################################

[[relations]]
id = "imports"
description = "Backend Python files imported by the artifact."

[[relations]]
id = "imported_by"
description = "Backend Python files that import the artifact."

# Tach provides direct backend Python imports for project modules.
[[rules]]
relation = "imports"
input = { type = "glob", pattern = "@/ffun/ffun/{**module_path}.py" }
output = {
  type = "command",
  command = "python ./bin/tach-map-query.py --direction dependencies --artifact @/ffun/ffun/{module_path}.py",
}

# Tach provides reverse backend Python import lookups for project modules.
[[rules]]
relation = "imported_by"
input = { type = "glob", pattern = "@/ffun/ffun/{**module_path}.py" }
output = {
  type = "command",
  command = "python ./bin/tach-map-query.py --direction dependents --artifact @/ffun/ffun/{module_path}.py",
}

################################
# Relation: governed_by / governs
################################

[[relations]]
id = "governed_by"
description = "Specifications that apply to the artifact."

[[relations]]
id = "governs"
description = "Artifacts governed by the specification."

# Every specification document is governed by the general specification rules.
# Note: general.md governs itself too.
[[rules]]
relation = "governed_by"
input = { type = "any", items = [
  { type = "glob", pattern = "@/specs/*.md" },
  { type = "glob", pattern = "@/specs/**/*.md" },
] }
output = { type = "list", artifacts = ["@/specs/meta/general.md"] }

# The general specification rules govern every specification document.
# Note: general.md governs itself too.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["@/specs/meta/general.md"] }
output = { type = "union", items = [
  { type = "files", pattern = "@/specs/*.md" },
  { type = "files", pattern = "@/specs/**/*.md" },
] }

# Backend Python files are governed by all backend architecture specs.
[[rules]]
relation = "governed_by"
input = { type = "glob", pattern = "@/ffun/ffun/**/*.py" }
output = { type = "files", pattern = "@/specs/backend_architecture/*.md" }

# Backend architecture specs govern all backend Python files.
[[rules]]
relation = "governs"
input = { type = "glob", pattern = "@/specs/backend_architecture/*.md" }
output = { type = "files", pattern = "@/ffun/ffun/**/*.py" }

# Frontend source files are governed by all frontend architecture specs.
[[rules]]
relation = "governed_by"
input = { type = "any", items = [
  { type = "glob", pattern = "@/site/src/**/*.ts" },
  { type = "glob", pattern = "@/site/src/**/*.vue" },
  { type = "glob", pattern = "@/site/src/**/*.css" },
  { type = "glob", pattern = "@/site/src/**/*.png" },
  { type = "glob", pattern = "@/site/src/**/*.ico" },
] }
output = { type = "files", pattern = "@/specs/frontend_architecture/*.md" }

# Frontend architecture specs govern all frontend source files.
[[rules]]
relation = "governs"
input = { type = "glob", pattern = "@/specs/frontend_architecture/*.md" }
output = { type = "union", items = [
  { type = "files", pattern = "@/site/src/**/*.ts" },
  { type = "files", pattern = "@/site/src/**/*.vue" },
  { type = "files", pattern = "@/site/src/**/*.css" },
  { type = "files", pattern = "@/site/src/**/*.png" },
  { type = "files", pattern = "@/site/src/**/*.ico" },
] }

# Prolog agent reasoning artifacts are governed by the Prolog tool spec.
[[rules]]
relation = "governed_by"
input = { type = "any", items = [
  { type = "one_of", artifacts = [
    "@/AGENTS.md",
    "@/bin/prolog.sh",
  ] },
  { type = "glob", pattern = "@/prolog/**/*.pl" },
] }
output = { type = "list", artifacts = ["@/specs/tools/prolog.md"] }

# The Prolog tool spec governs agent instructions, the wrapper, and reusable Prolog assets.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["@/specs/tools/prolog.md"] }
output = { type = "union", items = [
  { type = "list", artifacts = [
    "@/AGENTS.md",
    "@/bin/prolog.sh",
  ] },
  { type = "files", pattern = "@/prolog/**/*.pl" },
] }

# Dependency mesh tooling is governed by the backend module layout spec.
[[rules]]
relation = "governed_by"
input = { type = "one_of", artifacts = [
  "@/AGENTS.md",
  "@/depmesh.toml",
  "@/ffun/tach.toml",
  "@/bin/tach-map-query.py",
  "@/ffun/tach_map_query.py",
] }
output = { type = "list", artifacts = ["@/specs/backend_architecture/modules_layout.md"] }

# The backend module layout spec governs depmesh/tach configuration and helpers.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["@/specs/backend_architecture/modules_layout.md"] }
output = { type = "list", artifacts = [
  "@/AGENTS.md",
  "@/depmesh.toml",
  "@/ffun/tach.toml",
  "@/bin/tach-map-query.py",
  "@/ffun/tach_map_query.py",
] }

# README.md is governed by its documentation spec.
[[rules]]
relation = "governed_by"
input = { type = "one_of", artifacts = ["@/README.md"] }
output = { type = "list", artifacts = ["@/specs/documentation/readme.md"] }

# The README documentation spec governs README.md.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["@/specs/documentation/readme.md"] }
output = { type = "list", artifacts = ["@/README.md"] }

# Changelog artifacts are governed by the changelog documentation spec.
[[rules]]
relation = "governed_by"
input = { type = "any", items = [
  { type = "one_of", artifacts = ["@/CHANGELOG.md"] },
  { type = "glob", pattern = "@/changes/*.md" },
] }
output = { type = "list", artifacts = ["@/specs/documentation/changelog.md"] }

# The changelog documentation spec governs changelog artifacts.
[[rules]]
relation = "governs"
input = { type = "one_of", artifacts = ["@/specs/documentation/changelog.md"] }
output = { type = "union", items = [
  { type = "list", artifacts = ["@/CHANGELOG.md"] },
  { type = "files", pattern = "@/changes/*.md" },
] }

############################################
# Relation: terms_defined_by / defines_terms_for
############################################

[[relations]]
id = "terms_defined_by"
description = "Dictionaries that define terms used by the artifact."

[[relations]]
id = "defines_terms_for"
description = "Artifacts that use terms from the dictionary."

# Specs, code, documentation, and dependency metadata use terms defined in the project dictionary.
# Note: dictionary.md can define terms for itself too.
[[rules]]
relation = "terms_defined_by"
input = { type = "any", items = [
  { type = "glob", pattern = "@/specs/*.md" },
  { type = "glob", pattern = "@/specs/**/*.md" },
  { type = "glob", pattern = "@/ffun/ffun/**/*.py" },
  { type = "glob", pattern = "@/site/src/**/*.ts" },
  { type = "glob", pattern = "@/site/src/**/*.vue" },
  { type = "glob", pattern = "@/site/src/**/*.css" },
  { type = "glob", pattern = "@/site/src/**/*.png" },
  { type = "glob", pattern = "@/site/src/**/*.ico" },
  { type = "glob", pattern = "@/prolog/**/*.pl" },
  { type = "one_of", artifacts = [
    "@/AGENTS.md",
    "@/CHANGELOG.md",
    "@/README.md",
    "@/bin/prolog.sh",
    "@/bin/tach-map-query.py",
    "@/depmesh.toml",
    "@/ffun/tach.toml",
    "@/ffun/tach_map_query.py",
  ] },
] }
output = { type = "list", artifacts = ["@/specs/dictionary.md"] }

# The dictionary defines terms used by specs, code, documentation, and dependency metadata.
# Note: dictionary.md can define terms for itself too.
[[rules]]
relation = "defines_terms_for"
input = { type = "one_of", artifacts = ["@/specs/dictionary.md"] }
output = { type = "union", items = [
  { type = "files", pattern = "@/specs/*.md" },
  { type = "files", pattern = "@/specs/**/*.md" },
  { type = "files", pattern = "@/ffun/ffun/**/*.py" },
  { type = "files", pattern = "@/site/src/**/*.ts" },
  { type = "files", pattern = "@/site/src/**/*.vue" },
  { type = "files", pattern = "@/site/src/**/*.css" },
  { type = "files", pattern = "@/site/src/**/*.png" },
  { type = "files", pattern = "@/site/src/**/*.ico" },
  { type = "files", pattern = "@/prolog/**/*.pl" },
  { type = "list", artifacts = [
    "@/AGENTS.md",
    "@/CHANGELOG.md",
    "@/README.md",
    "@/bin/prolog.sh",
    "@/bin/tach-map-query.py",
    "@/depmesh.toml",
    "@/ffun/tach.toml",
    "@/ffun/tach_map_query.py",
  ] },
] }

#############################
# Relation: indexed_by / indexes
#############################

[[relations]]
id = "indexed_by"
description = "Indexes that list the specification."

[[relations]]
id = "indexes"
description = "Specifications listed by the index."

# Every specification document is listed by the spec index.
# Note: intro.md indexes itself too.
[[rules]]
relation = "indexed_by"
input = { type = "any", items = [
  { type = "glob", pattern = "@/specs/*.md" },
  { type = "glob", pattern = "@/specs/**/*.md" },
] }
output = { type = "list", artifacts = ["@/specs/intro.md"] }

# intro.md indexes every specification document.
# Note: intro.md indexes itself too.
[[rules]]
relation = "indexes"
input = { type = "one_of", artifacts = ["@/specs/intro.md"] }
output = { type = "union", items = [
  { type = "files", pattern = "@/specs/*.md" },
  { type = "files", pattern = "@/specs/**/*.md" },
] }
